<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050811">
    <title>Page Not Found - BackTrack</title>
    <meta name="description" content="Page not found. Return to BackTrack, the school lost-and-found system.">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/nav-auth.css">
    <style>
        body {
            background:
                radial-gradient(900px 500px at 8% -6%, rgba(37, 99, 235, 0.2) 0%, transparent 60%),
                radial-gradient(800px 460px at 92% 0%, rgba(6, 182, 212, 0.14) 0%, transparent 56%),
                linear-gradient(180deg, #060a14 0%, #050811 60%, #05070f 100%);
            color: #e7eef9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        .error-message {
            font-size: 16px;
            color: #b2bfd2;
            max-width: 400px;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-spacer { height: 70px; }

        /* Background grid effect */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
        }
    </style>
</head>

<body>
    <nav aria-label="Main navigation" role="navigation">
        <a href="index.html" class="nav-left" aria-label="BackTrack Home">
            <span class="brand-logo">
                <img class="logo-dark" src="logo.png" alt="BackTrack">
                <img class="logo-light" src="logo-white.png" alt="" aria-hidden="true">
            </span>
        </a>
        <div class="nav-center" role="menubar">
            <a href="browse.html" class="nav-link" role="menuitem">Browse</a>
            <a href="map.html" class="nav-link" role="menuitem">Map</a>
            <a href="submit.html" class="nav-link" role="menuitem">Submit</a>
            <a href="rewards.html" class="nav-link" role="menuitem">Rewards</a>
            <a href="features.html" class="nav-link" role="menuitem">Features</a>
            <a href="sources.html" class="nav-link" role="menuitem">Sources</a>
        </div>
        <div class="nav-right">
            <a class="sign-in-btn" href="login.html" aria-label="Log in to your account">Log In</a>
        </div>
    </nav>
    <div class="nav-spacer"></div>

    <div class="bg-grid"></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Looks like you're lost</h1>
    <p class="error-message">The page you are looking for doesn't exist or has been moved. Let's get you back on track.
    </p>
    <a href="index.html" class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Back to Home
    </a>

    <footer style="padding: 24px 40px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
        <div style="color: #888888; font-size: 13px;">&copy; 2025&ndash;2026 BackTrack. Built for FBLA Website Coding &amp; Development.</div>
        <div style="display: flex; gap: 24px;">
            <a href="features.html" style="color: #888888; text-decoration: none; font-size: 13px;">Features</a>
            <a href="sources.html" style="color: #888888; text-decoration: none; font-size: 13px;">Sources</a>
            <a href="index.html" style="color: #888888; text-decoration: none; font-size: 13px;">Home</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/accessibility.js"></script>
</body>

</html>
